<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - TrackEat</title>
  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configuración de Tailwind para usar Montserrat
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

<nav class="bg-[#c41200] p-4 text-white shadow-lg relative z-10">
  <div class="container mx-auto flex justify-between items-center">
    <a href="index.html" class="flex items-center gap-2 text-xl font-bold hover:text-red-200 transition">
      TrackEat
      <img src="img/Logo blanco chikito.png" alt="Logo TrackEat" class="h-10 relative -top-1">
    </a>
    <div class="flex items-center space-x-4">
      <a href="index.html" class="hover:text-red-200 transition">Inicio</a>
      <a href="login.html" class="hover:text-red-200 transition">Iniciar Sesión</a>
    </div>
  </div>
</nav>

<main class="flex-grow flex items-center justify-center p-6">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-[#c41200]">¿Olvidaste tu contraseña?</h2>
      <p class="text-gray-500 mt-2">No te preocupes. Ingresa tu correo y te enviaremos un enlace para recuperarla.</p>
    </div>

    <!-- Contenedor para mensajes -->
    <div id="message-container" class="hidden mb-4 p-3 rounded-md text-sm text-center"></div>

    <form id="forgot-password-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-envelope text-gray-400"></i>
          </div>
          <input type="email" name="email" id="email" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="tu@email.com" required>
        </div>
      </div>

      <div>
        <button type="submit" id="submit-btn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#c41200] hover:bg-[#a00e00] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#c41200] transition disabled:opacity-50">
          Enviar Enlace de Recuperación
        </button>
      </div>
    </form>

    <p class="mt-8 text-center text-sm text-gray-600">
      ¿Recordaste tu contraseña?
      <a href="login.html" class="font-medium text-[#c41200] hover:text-[#a00e00] transition">Inicia sesión</a>
    </p>
  </div>
</main>

<footer class="bg-gray-800 text-white pt-12 pb-8 mt-auto w-full">
    <div class="container mx-auto px-6">
        <div class="flex justify-center space-x-6 mb-4">
            <a href="https://www.instagram.com/trackeat.ok?igsh=anNzZ2V6c2dpZWxp" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-pink-500 transition-colors text-2xl"><i class="fab fa-instagram"></i></a>
            <a href="https://x.com/TrackEatOK" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-red-400 transition-colors text-2xl"><i class="fab fa-twitter"></i></a>
            <a href="https://www.tiktok.com/@TrackEatOK" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-white transition-colors text-2xl"><i class="fa-brands fa-tiktok"></i></a>
        </div>
        <div class="text-center text-sm text-gray-400">
            &copy; 2026 TrackEat. Todos los derechos reservados.
        </div>
    </div>
</footer>

<!-- CORREGIDO: Se incluye app.js para usar el cliente global de Supabase -->
<script src="js/app.js?v=2"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('forgot-password-form');
    const messageContainer = document.getElementById('message-container');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando...';
      messageContainer.classList.add('hidden');

      // CORREGIDO: Usamos 'supabaseClient' que viene de app.js
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html',
      });

      submitBtn.disabled = false;
      submitBtn.textContent = 'Enviar Enlace de Recuperación';

      if (error) {
        messageContainer.textContent = `Error: ${error.message}`;
        messageContainer.className = 'mb-4 p-3 rounded-md text-sm text-center bg-red-100 text-red-700';
        messageContainer.classList.remove('hidden');
      } else {
        messageContainer.textContent = '¡Revisa tu correo! Te hemos enviado un enlace para restablecer tu contraseña. No olvides mirar en la carpeta de spam.';
        messageContainer.className = 'mb-4 p-3 rounded-md text-sm text-center bg-green-100 text-green-700';
        messageContainer.classList.remove('hidden');
      }
    });
  });
</script>

</body>
</html>
