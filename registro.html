<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regístrate - GastroRadar</title>
  <!--suppress HtmlUnknownTarget, JSUnresolvedLibraryURL -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome para los iconos de redes sociales -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

<nav class="bg-[#c41200] p-4 text-white shadow-lg relative z-10">
  <div class="container mx-auto flex justify-between items-center">
    <a href="index.html" class="text-xl font-bold hover:text-red-200 transition">GastroRadar</a>
    <div class="flex items-center space-x-4">
      <a href="index.html" class="hover:text-red-200 transition">Inicio</a>
    </div>
  </div>
</nav>

<main class="flex-grow flex items-center justify-center p-6">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-[#c41200]">Únete a GastroRadar</h2>
      <p class="text-gray-500 mt-2">Crea tu cuenta para empezar a reseñar.</p>
    </div>

    <form id="register-form" class="space-y-6">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Nombre Completo</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-user text-gray-400"></i>
          </div>
          <input type="text" name="name" id="name" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="Juan Pérez" required>
        </div>
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-envelope text-gray-400"></i>
          </div>
          <input type="email" name="email" id="email" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="tu@email.com" required>
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fas fa-lock text-gray-400"></i>
          </div>
          <input type="password" name="password" id="password" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="••••••••" required>
        </div>
      </div>

      <div>
        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#c41200] hover:bg-[#a00e00] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#c41200] transition">
          Registrarse
        </button>
      </div>
    </form>

    <div class="mt-6">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500"> O regístrate con </span>
        </div>
      </div>

      <div class="mt-6 grid grid-cols-2 gap-3">
        <div>
          <a href="#" class="w-full flex items-center justify-center px-8 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition">
            <i class="fab fa-google text-red-500 mr-2"></i> Google
          </a>
        </div>
        <div>
          <a href="#" class="w-full flex items-center justify-center px-8 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition">
            <i class="fab fa-facebook-f text-blue-600 mr-2"></i> Facebook
          </a>
        </div>
      </div>
    </div>

    <p class="mt-8 text-center text-sm text-gray-600">
      ¿Ya tienes una cuenta?
      <a href="login.html" class="font-medium text-[#c41200] hover:text-[#a00e00] transition">Inicia sesión</a>
    </p>
  </div>
</main>

<footer class="bg-gray-800 text-white py-6 mt-auto w-full">
  <div class="container mx-auto px-6 text-center text-sm text-gray-400">
    &copy; 2024 GastroRadar. Todos los derechos reservados.
  </div>
</footer>

<script>
  document.getElementById('register-form').addEventListener('submit', (e) => {
    e.preventDefault();
    // Aquí irá la lógica de Supabase después
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
