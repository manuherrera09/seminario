<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regístrate - TrackEat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/login.css"> <!-- Reutilizamos los estilos del login -->
</head>
<body class="text-gray-800 bg-gray-50">

<nav class="bg-[#c41200] p-4 text-white shadow-lg relative z-10">
  <div class="container mx-auto flex justify-between items-center">
    <a href="index.html" class="text-xl font-bold hover:text-red-200 transition">TrackEat</a>
    <div class="flex items-center space-x-4">
      <a href="index.html" class="hover:text-red-200 transition">Inicio</a>
    </div>
  </div>
</nav>

<div class="flex" style="height: calc(100vh - 64px);">
  <!-- Columna Izquierda: Formulario -->
  <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h2 class="text-4xl font-bold text-gray-800">Únete a TrackEat</h2>
        <p class="text-gray-500 mt-2">Crea tu cuenta para empezar a reseñar.</p>
      </div>

      <div id="message-container" class="hidden mb-4 p-3 rounded-md text-sm text-center"></div>

      <form id="register-form" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Nombre de Usuario</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-user text-gray-400"></i>
            </div>
            <input type="text" name="username" id="username" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="tu_usuario" required>
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-envelope text-gray-400"></i>
            </div>
            <input type="email" name="email" id="email" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="tu@email.com" required>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input type="password" name="password" id="password" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="••••••••" required minlength="6">
          </div>
          <p class="mt-1 text-xs text-gray-500">Debe tener al menos 6 caracteres.</p>
        </div>

        <div>
          <button type="submit" id="submit-btn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-medium text-white bg-[#c41200] hover:bg-[#a00e00] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#c41200] transition disabled:opacity-50">
            Registrarse
          </button>
        </div>
      </form>

      <p class="mt-8 text-center text-sm text-gray-600">
        ¿Ya tienes una cuenta?
        <a href="login.html" class="font-medium text-[#c41200] hover:text-[#a00e00] transition">Inicia sesión</a>
      </p>
    </div>
  </div>

  <!-- Columna Derecha: Imagen -->
  <div class="hidden lg:block w-1/2 relative image-column">
    <div class="bg-carousel" id="register-carousel">
      <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1287&q=80" alt="Cocinando" class="bg-slide active">
      <img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=1287&q=80" alt="Ingredientes frescos" class="bg-slide">
      <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=1287&q=80" alt="Ensalada" class="bg-slide">
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const slides = document.querySelectorAll('#register-carousel .bg-slide');
    if (slides.length > 0) {
      let currentSlide = 0;
      const nextSlide = () => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      };
      setInterval(nextSlide, 5000);
    }
  });
</script>

<script src="js/registro.js"></script>

</body>
</html>
