<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Denuncias - TrackEat</title>
  <link rel="stylesheet" href="css/dark-mode.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[var(--color-background)] text-[var(--color-text-primary)] flex flex-col min-h-screen">

<nav class="bg-[#c41200] p-4 text-white shadow-lg relative z-50">
  <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="flex items-center w-full md:w-auto justify-between">
      <a href="index.html" class="text-xl font-bold hover:text-red-200 transition">TrackEat</a>
    </div>
    <div class="w-full md:w-1/3 relative">
      <div class="relative">
        <input type="text" id="nav-search-input" class="w-full py-2 pl-10 pr-4 bg-[var(--color-surface)] text-[var(--color-text-primary)] rounded-full shadow-inner focus:outline-none focus:ring-2 focus:ring-red-300 transition text-sm" placeholder="Busca un restaurante o usuario...">
        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-[var(--color-text-secondary)] text-sm"></i>
      </div>
      <div id="nav-search-suggestions" class="absolute w-full mt-1 bg-[var(--color-surface)] rounded-lg shadow-xl overflow-hidden hidden z-50 text-left">
        <ul id="nav-suggestions-list" class="max-h-60 overflow-y-auto"></ul>
      </div>
    </div>
    <div class="flex items-center space-x-4 w-full md:w-auto justify-end">
      <a href="index.html" class="hover:text-red-200 transition hidden md:inline">Inicio</a>
      <a href="resena.html" class="hover:text-red-200 transition">Dejar Reseña</a>
      <a href="perfil.html" class="bg-white text-[#c41200] px-4 py-2 rounded font-semibold hover:bg-gray-100 transition ml-2 md:ml-4">Mi Perfil</a>
      <div id="user-status" class="ml-2 pl-4 border-l border-red-300 flex items-center space-x-3 hidden md:flex relative">
        <a href="login.html" id="nav-login-btn" class="text-sm font-semibold hover:text-red-200 transition">Iniciar sesión</a>
        <a href="registro.html" id="nav-register-btn" class="text-sm bg-white text-[#c41200] px-3 py-1 rounded font-bold hover:bg-gray-100 transition">Regístrate</a>
        <div id="nav-notifications-container" class="relative hidden ml-3 z-50"></div>
      </div>
    </div>
  </div>
</nav>

<main class="container mx-auto p-6 flex-grow">
  <div class="bg-[var(--color-surface)] p-6 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold text-[var(--color-text-primary)] mb-6 border-b border-[var(--color-border)] pb-4">Mi Centro de Denuncias</h1>
    <p class="text-sm text-[var(--color-text-secondary)] mb-6">Aquí puedes ver el estado de las denuncias que has realizado.</p>

    <div id="my-reports-container" class="space-y-4">
      <p id="reports-loading" class="text-center text-[var(--color-text-secondary)] py-8">Cargando tus denuncias...</p>
      <!-- Las denuncias se cargarán aquí -->
    </div>
  </div>
</main>

<footer class="bg-gray-800 text-white pt-12 pb-6 mt-12">
    <!-- Footer -->
</footer>

<script src="js/app.js?v=2"></script>
<script src="js/centro-denuncias.js?v=2"></script>

</body>
</html>
