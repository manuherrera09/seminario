<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña - TrackEat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

<nav class="bg-[#c41200] p-4 text-white shadow-lg relative z-10">
  <div class="container mx-auto flex justify-between items-center">
    <a href="index.html" class="text-xl font-bold hover:text-red-200 transition">TrackEat</a>
    <div class="flex items-center space-x-4">
      <a href="index.html" class="hover:text-red-200 transition">Inicio</a>
    </div>
  </div>
</nav>

<main class="flex-grow flex items-center justify-center p-6">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-[#c41200]">Crea tu nueva contraseña</h2>
      <p class="text-gray-500 mt-2">Asegúrate de que sea segura.</p>
    </div>

    <div id="message-container" class="hidden mb-4 p-3 rounded-md text-sm text-center"></div>

    <form id="reset-password-form" class="space-y-6 hidden">
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Nueva Contraseña</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <input type="password" name="password" id="password" class="block w-full py-2 px-3 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="••••••••" required minlength="6">
        </div>
      </div>
      <div>
        <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirmar Nueva Contraseña</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <input type="password" name="confirm-password" id="confirm-password" class="block w-full py-2 px-3 border border-gray-300 rounded-md focus:outline-none focus:ring-[#c41200] focus:border-[#c41200] sm:text-sm" placeholder="••••••••" required minlength="6">
        </div>
      </div>
      <div>
        <button type="submit" id="submit-btn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#c41200] hover:bg-[#a00e00] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#c41200] transition disabled:opacity-50">
          Guardar Nueva Contraseña
        </button>
      </div>
    </form>
  </div>
</main>

<footer class="bg-gray-800 text-white pt-12 pb-8 mt-auto w-full">
    <div class="container mx-auto px-6 text-center text-sm text-gray-400">
        &copy; 2026 TrackEat. Todos los derechos reservados.
    </div>
</footer>

<!-- CORREGIDO: Se incluye app.js para usar el cliente global de Supabase -->
<script src="js/app.js?v=2"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('reset-password-form');
    const messageContainer = document.getElementById('message-container');
    const submitBtn = document.getElementById('submit-btn');

    // 1. Escuchar el evento de recuperación de contraseña
    // CORREGIDO: Usamos 'supabaseClient' que viene de app.js
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        form.classList.remove('hidden');
        messageContainer.classList.add('hidden');
      }
    });

    // 2. Manejar el envío del formulario
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = form.password.value;
      const confirmPassword = form['confirm-password'].value;

      if (password !== confirmPassword) {
        messageContainer.textContent = 'Las contraseñas no coinciden.';
        messageContainer.className = 'mb-4 p-3 rounded-md text-sm text-center bg-red-100 text-red-700';
        messageContainer.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Guardando...';

      // 3. Actualizar la contraseña del usuario
      // CORREGIDO: Usamos 'supabaseClient'
      const { error } = await supabaseClient.auth.updateUser({ password: password });

      submitBtn.disabled = false;
      submitBtn.textContent = 'Guardar Nueva Contraseña';

      if (error) {
        messageContainer.textContent = `Error: ${error.message}`;
        messageContainer.className = 'mb-4 p-3 rounded-md text-sm text-center bg-red-100 text-red-700';
      } else {
        form.classList.add('hidden');
        messageContainer.textContent = '¡Contraseña actualizada con éxito! Ya puedes iniciar sesión.';
        messageContainer.className = 'mb-4 p-3 rounded-md text-sm text-center bg-green-100 text-green-700';
        messageContainer.innerHTML += '<br><a href="login.html" class="font-bold underline hover:text-green-800">Ir a Iniciar Sesión</a>';
      }
      messageContainer.classList.remove('hidden');
    });
  });
</script>

</body>
</html>
